<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeetcodeMatric</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="h2">
            <h2 class="heading">V's LeetcodeMetric</h2>
        </div>
        <div class="usercontainer">
            <div class="userinput">
                <input  id="username" type="text" placeholder="Username">
                <button id="searchbut">Search</button>
            </div>
        </div>
        <div class="statscontainer">
            <div class="progress">
                <div class="progress_easy circle" id="easy">
                    <span id="easy-label"></span>
                    <span>Easy</span>
                </div>

                    <div class="progress_medium circle" id="medium">
                    <span id="medium-label"></span>
                    <span>Medium</span>
                    </div>

                    <div class="progress_hard circle" id="hard">
                    <span id="hard-label"></span>
                    <span>Hard</span>
                    </div>
            </div>
        </div>
        <div class="cardscontainer"></div>
    </div>
   <script src="app.js"></script>
</body>
</html>
